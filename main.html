<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlist</title>

    <style>
        body {

            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        h2 {
            text-align: center;
        }

        ul {
            padding: 0;
            text-align: center;
        }

        }

        .player_one,

            background-color: rgb(255, 255, 255);
            padding: 15px;
            border-radius: 10px;
            width: 60%;
            margin: 20px auto;
            text-align: center;
        }

        video, audio {
            width: 100%;
        }
    </style>
</head>
<body>
